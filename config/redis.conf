# Project Nebula — Redis configuration
# Optimised for Celery broker + result backend workload

# Persistence: RDB snapshot + AOF for durability
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# Memory policy: evict volatile LRU keys when maxmemory is reached
maxmemory 2gb
maxmemory-policy volatile-lru

# Authentication
# NOTE: requirepass is NOT set here because docker-compose injects the password
# via the CLI flag: redis-server redis.conf --requirepass ${REDIS_PASSWORD}
# This keeps the secret out of the config file and under env-var control.
# All clients must authenticate; REDIS_URL in common-env includes the password.

# Connection
tcp-keepalive 300
timeout 0

# Logging
loglevel notice
