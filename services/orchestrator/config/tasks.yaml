##############################################################################
# CrewAI Task Definitions — Project Nebula
# Descriptions are in English (backend). Only SEO task output is in Polish.
##############################################################################

cso_strategy_task:
  description: >
    You are the Chief Strategy Officer for an autonomous AI music label.
    The user has selected a genre — you decide EVERYTHING else.

    MISSION BRIEF:
    - Mix ID (use EXACTLY this value): {mix_id}
    - User-selected genre: {genre}
    - Genre BPM range: {genre_bpm_min}–{genre_bpm_max} BPM
    - Mix duration (autonomously selected): {requested_duration_minutes} minutes
    - Already-used BPM/subgenre/key combinations to AVOID: {used_combinations}

    YOUR AUTONOMOUS DECISIONS (make them confidently — do NOT ask the user):
    1. Select an exact BPM within {genre_bpm_min}–{genre_bpm_max} that is NOT in
       the used_combinations list. Choose a value that feels fresh and energetic
       for the current music market.
    2. Select a specific subgenre of {genre} that has NOT been used recently.
       Be precise: e.g. for "Techno" choose "Hypnotic Acid Techno" not just "Techno".
    3. Choose a key signature that is emotionally appropriate for this genre
       and has NOT been used with this BPM+subgenre combination.
    4. Write style_description: MAX 1 sentence, MAX 25 words. Name bass texture,
       drum style, and one atmosphere word. Example: "Rolling Reese bass, amen
       breaks, dark atmospheric pads with filtered vocal chops."
    5. Write transition_arc: MAX 1 sentence, MAX 30 words. Use minute markers.
       Example: "Sparse intro 0-3 min, first drop 4 min, peak 20-35 min, liquid
       breakdown 40 min, euphoric outro 48 min."
    6. Calculate stem_count: floor(duration_minutes * 2) — minimum 14, maximum 150.

    CRITICAL: The combination (bpm, subgenre, key_signature) MUST be unique
    and not present in the used_combinations list. This guarantees zero repetition
    across the entire label catalogue.
  expected_output: >
    A valid JSON object with EXACTLY these keys:
    {
      "mix_id": "<the provided mix_id>",
      "bpm": <float>,
      "subgenre": "<string>",
      "key_signature": "<string>",
      "style_description": "<English string>",
      "transition_arc": "<English string>",
      "stem_count": <int>,
      "requested_duration_minutes": <int>
    }

audio_prompt_task:
  description: >
    Mix ID: {mix_id}
    This is batch {batch_num} of {total_batches} for a {total_stems}-stem mix.

    Strategic brief:
    - BPM: {bpm}
    - Subgenre: {subgenre}
    - Key: {key_signature}
    - Style: {style_description}
    - Arc: {transition_arc}

    Generate EXACTLY {batch_size} audio stem prompts for positions {position_start}
    through {position_end_inclusive} (0-indexed, inclusive on both ends).
    IMPORTANT: Count to {batch_size} before you start writing. You MUST output
    EXACTLY {batch_size} items — not {batch_size_minus_1}, not {batch_size_plus_1}.

    Arc context: stems 0–{arc_intro_end} are intro/build, stems {arc_peak_start}–{arc_peak_end}
    are peak energy, stems {arc_outro_start}–{total_stems_minus_1} are breakdown/outro.
    Place this batch correctly within that arc.

    Rules for every prompt:
    1. English only.
    2. 30-50 words MAXIMUM. Include: exact BPM, drum pattern type, bassline type,
       one atmosphere word, energy phrase. Be concise — every word counts.
    3. Drum pattern: amen break / jungle step / half-time / rolling / four-on-floor
    4. Bassline: Reese / Neuro / Liquid / Rollers / wobble / sub-only
    5. Energy level phrase: "building tension" / "full drop" / "breakdown" / "peak energy" / "gradual outro"
    6. transition_type: one of intro | build | drop | breakdown | peak | outro
    7. intensity: float 0.0 (calm) to 1.0 (maximum energy) — follow the arc

  expected_output: >
    A valid JSON object with EXACTLY {batch_size} entries in "prompts":
    {
      "mix_id": "{mix_id}",
      "prompts": [
        {
          "position": {position_start},
          "prompt_en": "<40-80 word English prompt>",
          "transition_type": "<intro|build|drop|breakdown|peak|outro>",
          "intensity": <0.0-1.0>
        },
        ...
      ]
    }
    Positions must be sequential integers from {position_start} to {position_end_inclusive}.

visual_prompt_task:
  description: >
    Create visual prompts for these assets based on the mix brief:
    - Subgenre: {subgenre}
    - BPM: {bpm}
    - Style: {style_description}

    Generate prompts for these 8 assets:
    1. background_image (16:9) — Main YouTube video background. 1 prompt.
    2. video_loop (16:9) — 3 Veo video loops for background animation.
    3. thumbnail (16:9) — Eye-catching YouTube thumbnail. 1 prompt.
    4. short_background (9:16) — Vertical background for Shorts/TikTok. 1 prompt.
    5. short_thumbnail (9:16) — TikTok/Shorts cover image. 1 prompt.

    Each prompt must be 30-60 words, photorealistic quality directive, English only.
    Include: style (cinematic/neon/cyberpunk/organic/industrial), lighting quality,
    mood, specific visual elements. NEVER use generic terms like "abstract background".
  expected_output: >
    A valid JSON object:
    {
      "mix_id": "<mix_id>",
      "prompts": [
        {
          "visual_type": "<background_image|video_loop|thumbnail|short_background|short_thumbnail>",
          "aspect_ratio": "<16:9|9:16>",
          "prompt_en": "<English prompt>"
        },
        ...
      ]
    }

polish_seo_task:
  description: >
    Generate ALL YouTube/TikTok metadata for this mix. CRITICAL: ALL OUTPUT
    MUST BE IN POLISH (język polski). Not English. Not mixed. Pure Polish.

    Mix information (in English for your reference only — do not output in English):
    - Subgenre: {subgenre}
    - BPM: {bpm}
    - Duration: {duration_seconds} seconds ({duration_minutes} minutes)
    - Style: {style_description}
    - Transition arc: {transition_arc}
    - Number of chapters: {chapter_count}

    Requirements:
    1. title_pl: Max 100 characters. Must include: emoji, emotional hook, genre name
       in Polish or English (as used in Polish YouTube culture), BPM, year.
       Pattern: "[emoji] [EMOTIONAL HOOK] [Subgenre] | [Duration] MINUT [context] [BPM BPM]"
       Example: "🔥 2 GODZINY CZYSTEGO NEUROFUNK | Mix 2026 [174 BPM]"

    2. description_pl: 400-800 words. Polish SEO-optimised. Must include:
       - Opening hook (first 2 lines visible before "show more")
       - Track listing placeholder (📀 TRACKLIST below)
       - Chapter timestamps copied from chapters_pl
       - Channel subscribe call-to-action
       - 5-8 relevant keyword phrases naturally embedded
       - Social links placeholder

    3. tags_pl: 30-50 hashtags/tags. Mix of: genre tags (Polish & English),
       BPM tag, year tag, mood tags in Polish, activity tags
       ("do jazdy", "do nauki", "praca"), platform tags.
       Total tag string must be under 500 chars.

    4. chapters_pl: Generate {chapter_count} chapter markers based on the
       transition arc. Timestamps must be accurate to the arc description.
       Format: [{"time_str": "00:00", "title_pl": "Intro - Powolne Wejście"}, ...]

    5. shorts_titles_pl: 3 Polish titles for the viral short clips (60s each).
       Each max 80 chars, must include energy hook and timestamp context.
       Example: "🔥 NAJLEPSZY DROP | Neurofunk Mix 2026"
  expected_output: >
    A valid JSON object with ALL fields in Polish:
    {
      "mix_id": "<mix_id>",
      "title_pl": "<Polish title>",
      "description_pl": "<Full Polish description>",
      "tags_pl": ["<tag1_pl>", "<tag2_pl>", ...],
      "chapters_pl": [{"time_str": "00:00", "title_pl": "<Polish>"}, ...],
      "shorts_titles_pl": ["<title1_pl>", "<title2_pl>", "<title3_pl>"]
    }
