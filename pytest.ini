[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Pure unit tests (no DB, no API calls)
    integration: Integration tests (require live services)
    dsp: DSP/audio tests (require librosa + pedalboard)
    slow: Long-running tests
    anyio: Run async tests with anyio backend
